<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>五子棋</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            background: #f5f5dc;
            padding-top: 30px;
        }
        h2 {
            margin-bottom: 15px;
            color: #333;
        }
        #msg {
            font-size: 20px;
            margin-bottom: 15px;
            color: #c00;
        }
        #chessboard {
            background: #deb887;
            border: 2px solid #8b4513;
        }
        #restartBtn {
            margin-top: 20px;
            padding: 8px 25px;
            font-size: 18px;
            cursor: pointer;
            background: #8b4513;
            color: #fff;
            border: none;
            border-radius: 6px;
            display: none;
        }
        #restartBtn:hover {
            background: #a0522d;
        }
    </style>
</head>
<body>
    <h2>五子棋双人对战</h2>
    <div id="msg">黑棋先行</div>
    <canvas id="chessboard" width="450" height="450"></canvas>
    <button id="restartBtn">重新开始</button>

    <script>
        const canvas = document.getElementById('chessboard');
        const ctx = canvas.getContext('2d');
        const msg = document.getElementById('msg');
        const restartBtn = document.getElementById('restartBtn');

        const grid = 15;
        const cell = 30;
        let board = [];
        let current = 1;
        let gameOver = false;

        // 初始化棋盘数据
        function initBoard() {
            board = [];
            for(let i = 0; i < grid; i++) {
                board[i] = [];
                for(let j = 0; j < grid; j++) {
                    board[i][j] = 0;
                }
            }
        }

        // 绘制棋盘线条
        function drawBoard() {
            ctx.clearRect(0,0,canvas.width,canvas.height);
            for(let i = 0; i <= grid; i++) {
                ctx.beginPath();
                ctx.moveTo(i * cell, 0);
                ctx.lineTo(i * cell, grid * cell);
                ctx.stroke();

                ctx.beginPath();
                ctx.moveTo(0, i * cell);
                ctx.lineTo(grid * cell, i * cell);
                ctx.stroke();
            }
        }

        // 绘制棋子
        function drawPiece(x, y, color) {
            ctx.beginPath();
            ctx.arc(x * cell + cell/2, y * cell + cell/2, cell/2 - 2, 0, Math.PI * 2);
            ctx.fillStyle = color === 1 ? '#000' : '#fff';
            ctx.fill();
            ctx.strokeStyle = '#333';
            ctx.stroke();
        }

        // 重绘所有棋子
        function redrawAll() {
            drawBoard();
            for(let x = 0; x < grid; x++) {
                for(let y = 0; y < grid; y++) {
                    if(board[x][y] !== 0) {
                        drawPiece(x, y, board[x][y]);
                    }
                }
            }
        }

        // 点击落子
        canvas.onclick = function(e) {
            if(gameOver) return;
            let rect = canvas.getBoundingClientRect();
            let x = Math.floor((e.clientX - rect.left) / cell);
            let y = Math.floor((e.clientY - rect.top) / cell);

            if(x < 0 || x >= grid || y <0 || y >= grid || board[x][y] !== 0) return;

            board[x][y] = current;
            drawPiece(x, y, current);

            if(checkWin(x, y)) {
                msg.innerText = current === 1 ? '黑棋获胜！' : '白棋获胜！';
                gameOver = true;
                restartBtn.style.display = 'block'; // 显示重新开始按钮
                return;
            }

            current = current === 1 ? 2 : 1;
            msg.innerText = current === 1 ? '轮到黑棋' : '轮到白棋';
        }

        // 判断五子连珠
        function checkWin(x, y) {
            let dirs = [[1,0],[0,1],[1,1],[1,-1]];
            for(let [dx, dy] of dirs) {
                let count = 1;
                for(let i = 1; i < 5; i++) {
                    let nx = x + dx*i;
                    let ny = y + dy*i;
                    if(nx>=0&&nx<grid&&ny>=0&&ny<grid&&board[nx][ny]===current) count++;
                    else break;
                }
                for(let i = 1; i < 5; i++) {
                    let nx = x - dx*i;
                    let ny = y - dy*i;
                    if(nx>=0&&nx<grid&&ny>=0&&ny<grid&&board[nx][ny]===current) count++;
                    else break;
                }
                if(count >=5) return true;
            }
            return false;
        }

        // 重新开始游戏
        restartBtn.onclick = function() {
            gameOver = false;
            current = 1;
            initBoard();
            redrawAll();
            msg.innerText = '黑棋先行';
            restartBtn.style.display = 'none'; // 隐藏按钮
        }

        // 页面初始化
        initBoard();
        drawBoard();
    </script>
</body>
</html>

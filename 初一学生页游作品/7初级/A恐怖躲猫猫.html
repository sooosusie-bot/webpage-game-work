<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>恐怖躲猫猫</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #111;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 20px;
            font-family: "微软雅黑", sans-serif;
            color: #fff;
        }
        #gameBox {
            position: relative;
            width: 800px;
            height: 500px;
            background: #222;
            border: 3px solid #ff3333;
            overflow: hidden;
        }
        #info {
            font-size: 20px;
            margin-bottom: 10px;
        }
        .wall {
            position: absolute;
            background: #444;
        }
        .hideBox {
            position: absolute;
            background: #663300;
            border: 2px solid #996633;
        }
        #player {
            position: absolute;
            width: 30px;
            height: 30px;
            background: #3399ff;
            border-radius: 50%;
            z-index: 10;
        }
        #monster {
            position: absolute;
            width: 35px;
            height: 35px;
            background: #ff0000;
            border-radius: 5px;
            z-index: 9;
        }
        #tip {
            margin-top: 10px;
            font-size: 16px;
            color: #ccc;
        }
        #gameOver {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            display: none;
            text-align: center;
            padding-top: 180px;
        }
        #resultText {
            font-size: 40px;
            color: #ff3333;
        }
        #restartBtn {
            margin-top: 30px;
            padding: 12px 30px;
            font-size: 20px;
            background: #ff3333;
            color: #fff;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }
        #restartBtn:hover {
            background: #ff5555;
        }
    </style>
</head>
<body>
    <div id="info">剩余时间：<span id="time">60</span> 秒</div>
    <div id="gameBox">
        <div id="player"></div>
        <div id="monster"></div>
        <div id="gameOver">
            <div id="resultText"></div>
            <button id="restartBtn">重新开始游戏</button>
        </div>
    </div>
    <div id="tip">方向键移动 | 靠近柜子按空格躲藏</div>

    <script>
        // 游戏元素
        const gameBox = document.getElementById('gameBox');
        const player = document.getElementById('player');
        const monster = document.getElementById('monster');
        const timeSpan = document.getElementById('time');
        const gameOverDom = document.getElementById('gameOver');
        const resultText = document.getElementById('resultText');
        const restartBtn = document.getElementById('restartBtn');

        // 全局变量
        let gameW = 800;
        let gameH = 500;
        let playerX, playerY;
        let monsterX, monsterY;
        let speed = 4;
        let monsterSpeed = 1.5;
        let isHide = false;
        let gameRun = true;
        let time = 60;
        let timerInterval = null;

        // 围墙数据
        const walls = [
            {x:0,y:0,w:800,h:20},
            {x:0,y:480,w:800,h:20},
            {x:0,y:0,w:20,h:500},
            {x:780,y:0,w:20,h:500},
            {x:200,y:100,w:20,h:300},
            {x:400,y:80,w:20,h:350},
            {x:600,y:120,w:20,h:300}
        ];

        // 躲藏柜数据
        const hideBoxs = [
            {x:100,y:350,w:60,h:60},
            {x:300,y:150,w:60,h:60},
            {x:500,y:380,w:60,h:60},
            {x:700,y:200,w:60,h:60}
        ];

        // 生成地图
        function createMap() {
            // 清空旧围墙和柜子
            document.querySelectorAll('.wall,.hideBox').forEach(el=>el.remove());
            // 生成围墙
            walls.forEach(item=>{
                let wall = document.createElement('div');
                wall.className = 'wall';
                wall.style.left = item.x + 'px';
                wall.style.top = item.y + 'px';
                wall.style.width = item.w + 'px';
                wall.style.height = item.h + 'px';
                gameBox.appendChild(wall);
            });
            // 生成柜子
            hideBoxs.forEach(item=>{
                let box = document.createElement('div');
                box.className = 'hideBox';
                box.style.left = item.x + 'px';
                box.style.top = item.y + 'px';
                box.style.width = item.w + 'px';
                box.style.height = item.h + 'px';
                gameBox.appendChild(box);
            });
        }

        // 重置游戏
        function resetGame() {
            // 清除倒计时
            if(timerInterval) clearInterval(timerInterval);
            // 重置位置
            playerX = 100; playerY = 100;
            monsterX = 600; monsterY = 300;
            isHide = false;
            gameRun = true;
            time = 60;
            timeSpan.innerText = time;
            player.style.opacity = 1;
            gameOverDom.style.display = 'none';

            // 初始化角色位置
            player.style.left = playerX + 'px';
            player.style.top = playerY + 'px';
            monster.style.left = monsterX + 'px';
            monster.style.top = monsterY + 'px';

            // 重新开启倒计时和游戏循环
            countDown();
            gameLoop();
        }

        // 键盘控制
        const key = {};
        document.addEventListener('keydown',e=>{
            key[e.key] = true;
            if(e.key === ' ' && gameRun){
                checkHide();
            }
        });
        document.addEventListener('keyup',e=>{
            key[e.key] = false;
        });

        // 检测躲藏
        function checkHide(){
            for(let b of hideBoxs){
                if(
                    playerX > b.x - 20 && playerX < b.x + b.w &&
                    playerY > b.y - 20 && playerY < b.y + b.h
                ){
                    isHide = !isHide;
                    player.style.opacity = isHide ? '0.2' : '1';
                    return;
                }
            }
        }

        // 围墙碰撞
        function checkWall(x,y,w,h){
            for(let wall of walls){
                if(
                    x < wall.x + wall.w &&
                    x + w > wall.x &&
                    y < wall.y + wall.h &&
                    y + h > wall.y
                ){
                    return true;
                }
            }
            return false;
        }

        // 怪物移动AI
        function monsterMove(){
            if(isHide) return;
            if(monsterX < playerX) monsterX += monsterSpeed;
            if(monsterX > playerX) monsterX -= monsterSpeed;
            if(monsterY < playerY) monsterY += monsterSpeed;
            if(monsterY > playerY) monsterY -= monsterSpeed;
        }

        // 检测被抓
        function checkCatch(){
            if(isHide) return false;
            let dx = Math.abs(playerX - monsterX);
            let dy = Math.abs(playerY - monsterY);
            return dx < 30 && dy < 30;
        }

        // 游戏主循环
        function gameLoop(){
            if(!gameRun) return;

            let nx = playerX;
            let ny = playerY;
            if(key['ArrowUp']) ny -= speed;
            if(key['ArrowDown']) ny += speed;
            if(key['ArrowLeft']) nx -= speed;
            if(key['ArrowRight']) nx += speed;

            if(!checkWall(nx,ny,30,30)){
                playerX = nx;
                playerY = ny;
            }

            monsterMove();

            player.style.left = playerX + 'px';
            player.style.top = playerY + 'px';
            monster.style.left = monsterX + 'px';
            monster.style.top = monsterY + 'px';

            if(checkCatch()){
                gameOver('你被怪物抓住了！游戏失败');
                return;
            }

            requestAnimationFrame(gameLoop);
        }

        // 倒计时
        function countDown(){
            timerInterval = setInterval(()=>{
                time--;
                timeSpan.innerText = time;
                if(time <= 0){
                    clearInterval(timerInterval);
                    gameOver('恭喜你！成功躲藏胜利！');
                }
            },1000);
        }

        // 游戏结束
        function gameOver(text){
            gameRun = false;
            resultText.innerText = text;
            gameOverDom.style.display = 'block';
        }

        // 重新开始按钮事件
        restartBtn.onclick = function(){
            resetGame();
        }

        // 初始化启动
        createMap();
        resetGame();
    </script>
</body>
</html>

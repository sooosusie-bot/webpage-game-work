<!-- 简易数独游戏 - 基础HTML/CSS/JS -->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>数独游戏</title>
    <style>
        /* ======== 可修改的CSS样式 ======== */
        /* 数独容器 */
        .sudoku {
            display: grid;
            grid-template-columns: repeat(9, 50px);
            gap: 0;
            border: 3px solid #2d3436;
            margin: 20px auto;
        }

        /* 格子样式 */
        .cell {
            width: 50px;
            height: 50px;
            border: 1px solid #ccc;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            outline: none;
            text-align: center;
        }

        /* 加粗分割线（区分3x3宫格） */
        .cell:nth-child(3n) {
            border-right: 2px solid #2d3436;
        }
        .cell:nth-child(9n+1) {
            border-left: 2px solid #2d3436;
        }
        .cell:nth-child(n+19):nth-child(-n+27),
        .cell:nth-child(n+46):nth-child(-n+54) {
            border-bottom: 2px solid #2d3436;
        }

        /* 固定数字样式 */
        .fixed {
            background: #dfe6e9;
            font-weight: bold;
            color: #2d3436;
        }

        /* 标题 */
        h2 {
            text-align: center;
            color: #2d3436;
            margin-top: 30px;
        }
    </style>
</head>
<body>
    <h2>基础数独游戏</h2>
    <div class="sudoku" id="board"></div>

    <script>
        // 数独题目（0代表空白）
        const board = [
            [5,3,0,0,7,0,0,0,0],
            [6,0,0,1,9,5,0,0,0],
            [0,9,8,0,0,0,0,6,0],
            [8,0,0,0,6,0,0,0,3],
            [4,0,0,8,0,3,0,0,1],
            [7,0,0,0,2,0,0,0,6],
            [0,6,0,0,0,0,2,8,0],
            [0,0,0,4,1,9,0,0,5],
            [0,0,0,0,8,0,0,7,9]
        ];

        // 渲染数独
        function render() {
            const container = document.getElementById("board");
            container.innerHTML = "";
            for(let row=0; row<9; row++){
                for(let col=0; col<9; col++){
                    const input = document.createElement("input");
                    input.className = "cell";
                    input.maxLength = 1;
                    
                    if(board[row][col] !== 0){
                        input.value = board[row][col];
                        input.disabled = true;
                        input.classList.add("fixed");
                    }
                    container.appendChild(input);
                }
            }
        }

        // 页面加载完成渲染
        window.onload = render;
    </script>
</body>
</html>
            </textarea>
            <div class="btn-box">
                <button class="btn" id="runBtn">▶️ 运行代码</button>
                <button class="btn" id="resetBtn">🔄 重置代码</button>
            </div>
        </div>

        <!-- 右侧：游戏运行面板 -->
        <div class="game-area">
            <h3 class="area-title" style="color:#2d3436;">🎮 数独游戏运行界面</h3>
            <iframe id="gameFrame"></iframe>
            <div class="study-tips">
                <strong>📚 学生编程练习任务：</strong><br>
                1. 修改 .cell 的 width/height 改变格子大小<br>
                2. 修改背景色、文字颜色、边框颜色<br>
                3. 调整标题字体大小、颜色<br>
                4. 替换数独题目数字，生成新关卡<br>
                5. 给空白格子添加自定义颜色<br>
                修改完成后点击【运行代码】查看效果！
            </div>
        </div>
    </div>

    <script>
        // 获取核心元素
        const codeEditor = document.getElementById("codeInput");
        const gameFrame = document.getElementById("gameFrame");
        const runBtn = document.getElementById("runBtn");
        const resetBtn = document.getElementById("resetBtn");

        // 默认原始代码
        const defaultCode = codeEditor.value.trim();

        // 运行代码：渲染到iframe
        runBtn.addEventListener("click", () => {
            gameFrame.srcdoc = codeEditor.value;
        });

        // 重置代码
        resetBtn.addEventListener("click", () => {
            codeEditor.value = defaultCode;
        });

        // 页面加载自动运行
        window.onload = () => {
            gameFrame.srcdoc = codeEditor.value;
        };
    </script>
</body>
</html>

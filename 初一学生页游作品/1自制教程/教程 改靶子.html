<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>CSS定位射击游戏 - 编程教学</title>
    <style>
        /* 全局基础样式 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", sans-serif;
        }

        /* 页面布局：左右分栏 */
        .game-container {
            display: flex;
            width: 100vw;
            height: 100vh;
            background: #f5f7fa;
            gap: 20px;
            padding: 20px;
        }

        /* 左侧：游戏运行区域（靶场） */
        .game-area {
            flex: 1;
            background: linear-gradient(to bottom, #87CEEB 0%, #98D8C8 100%);
            border: 4px solid #333;
            border-radius: 8px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 0 15px rgba(0,0,0,0.2);
        }

        /* 靶场地面 */
        .ground {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 80px;
            background: #8B4513;
            border-top: 5px solid #654321;
        }

        /* 靶子样式 —— 反应更快 */
        .target {
            position: absolute; 
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: red;
            border: 8px solid white;
            box-shadow: 0 0 0 4px red;
            cursor: pointer;
            transition: all 0.08s ease; /* 更快的点击反馈 */
        }

        .target:active {
            transform: scale(0.85);
        }

        /* 三个靶子初始位置（附近分布） */
        #target1 { top: 100px; right: 120px; }
        #target2 { top: 130px; right: 180px; }
        #target3 { top: 70px; right: 150px; }

        /* 射击准星 */
        .crosshair {
            position: absolute;
            width: 20px;
            height: 20px;
            border: 2px solid #fff;
            border-radius: 50%;
            pointer-events: none;
            transform: translate(-50%, -50%);
        }

        /* 右侧：代码编辑区域 */
        .code-editor {
            width: 550px;
            background: #1e1e1e;
            color: #fff;
            border-radius: 8px;
            padding: 15px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 0 15px rgba(0,0,0,0.3);
        }

        .code-title {
            font-size: 18px;
            margin-bottom: 10px;
            color: #4FC1FF;
            text-align: center;
        }

        #codeInput {
            flex: 1;
            background: #252526;
            color: #D4D4D4;
            border: 1px solid #3E3E3E;
            border-radius: 4px;
            padding: 12px;
            font-size: 14px;
            resize: none;
            outline: none;
            font-family: "Consolas", monospace;
        }

        #runBtn {
            margin-top: 12px;
            padding: 10px;
            background: #28a745;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.2s;
        }

        #runBtn:hover {
            background: #218838;
        }

        /* 得分显示 */
        .score-box {
            margin-top: 10px;
            padding: 8px;
            background: #252526;
            border-radius: 4px;
            text-align: center;
            font-size: 16px;
            color: #fff;
        }

        .tips {
            margin-top: 10px;
            font-size: 12px;
            color: #ccc;
            line-height: 1.4;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <!-- 左侧游戏区 -->
        <div class="game-area" id="gameArea">
            <div class="ground"></div>
            <div class="target" id="target1"></div>
            <div class="target" id="target2"></div>
            <div class="target" id="target3"></div>
            <div class="crosshair" id="crosshair"></div>
        </div>

        <!-- 右侧代码区 -->
        <div class="code-editor">
            <h3 class="code-title">📝 CSS定位代码编辑器</h3>
            <textarea id="codeInput">/* 在这里修改CSS代码，点击运行生效！ */
/* 学习知识点：position定位 / top / right / 大小 */

.target {
  position: absolute;
  width: 60px;
  height: 60px;
  background: red;
  border-radius: 50%;
}

/* 靶子1位置 */
#target1 {
  top: 100px;
  right: 120px;
}

/* 靶子2位置 */
#target2 {
  top: 130px;
  right: 180px;
}

/* 靶子3位置 */
#target3 {
  top: 70px;
  right: 150px;
}

.game-area {
  background: linear-gradient(#87CEEB, #98D8C8);
}</textarea>
            <button id="runBtn">▶ 运行代码</button>
            <div class="score-box">当前得分：<span id="score">0</span></div>
            <div class="tips">
                ✅ 教学知识点：position定位、绝对定位、坐标偏移<br>
                ✅ 操作：修改top/right数值 → 点击运行 → 靶子移动<br>
                ✅ 拓展：修改颜色、大小、边框，打造专属靶场！
            </div>
        </div>
    </div>

    <script>
        // 准星跟随鼠标
        const gameArea = document.getElementById('gameArea');
        const crosshair = document.getElementById('crosshair');
        
        gameArea.addEventListener('mousemove', (e) => {
            const rect = gameArea.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            crosshair.style.left = x + 'px';
            crosshair.style.top = y + 'px';
        });

        // 代码运行（无提示）
        const runBtn = document.getElementById('runBtn');
        const codeInput = document.getElementById('codeInput');
        const styleTag = document.createElement('style');
        document.head.appendChild(styleTag);

        runBtn.addEventListener('click', () => {
            styleTag.textContent = codeInput.value;
        });

        // 点击靶子计分（随机移动任意一个靶子）
        const targets = document.querySelectorAll('.target');
        const scoreText = document.getElementById('score');
        let score = 0;
        
        // 移动函数：随机选一个靶子移动
        function moveRandomTarget() {
            const randomTarget = targets[Math.floor(Math.random() * targets.length)];
            const currentTop = parseInt(randomTarget.style.top) || 100;
            const currentRight = parseInt(randomTarget.style.right) || 120;
            
            // 中间距离移动 ±60px
            const newTop = currentTop + (Math.random() * 120 - 60);
            const newRight = currentRight + (Math.random() * 120 - 60);

            randomTarget.style.top = newTop + 'px';
            randomTarget.style.right = newRight + 'px';
        }

        // 点击任意靶子，都计分 + 随机移动一个靶子
        targets.forEach(target => {
            target.addEventListener('click', () => {
                score++;
                scoreText.textContent = score;
                moveRandomTarget(); // 核心：随机移动
            });
        });
    </script>
</body>
</html>

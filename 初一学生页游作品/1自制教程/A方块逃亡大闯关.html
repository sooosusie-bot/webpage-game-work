<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>方块逃亡大闯关</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Consolas", "微软雅黑", sans-serif;
        }
        body {
            background: #f2f5f9;
            padding: 15px;
        }
        .container {
            display: flex;
            gap: 20px;
            height: 93vh;
        }
        /* 左侧游戏区 */
        .game-wrap {
            flex: 1;
            background: #fff;
            border-radius: 10px;
            padding: 15px;
            box-shadow: 0 0 12px #ccc;
            display: flex;
            flex-direction: column;
        }
        .game-title {
            text-align: center;
            font-size: 22px;
            font-weight: bold;
            color: #222;
            margin-bottom: 10px;
        }
        #gameBox {
            flex: 1;
            width: 100%;
            background: #7ed6df;
            position: relative;
            overflow: hidden;
            border: 3px solid #222;
        }
        /* 上下封顶墙 */
        .wall-top {
            width: 100%;
            height: 50px;
            background: #27ae60;
            position: absolute;
            top: 0;
            left: 0;
        }
        .wall-bottom {
            width: 100%;
            height: 50px;
            background: #27ae60;
            position: absolute;
            bottom: 0;
            left: 0;
        }
        /* 飞行主角 */
        #player {
            width: 36px;
            height: 36px;
            background: #f39c12;
            border-radius: 6px;
            position: absolute;
            left: 60px;
            top: 50%;
        }
        /* 管道基础样式 */
        .pipe {
            width: 50px;
            position: absolute;
            left: 100%;
            border-radius: 4px;
        }
        /* 积分 */
        .score {
            position: absolute;
            top: 60px;
            left: 20px;
            font-size: 24px;
            font-weight: bold;
            color: #fff;
            text-shadow: 1px 1px 3px #000;
        }
        /* 撞脸文字 */
        .fail-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 80px;
            font-weight: bold;
            color: red;
            text-shadow: 3px 3px 6px #000;
            display: none;
            z-index: 99;
        }
        .restart-tip {
            position: absolute;
            top: 68%;
            left: 50%;
            transform: translate(-50%,-50%);
            font-size: 20px;
            color: #fff;
            text-shadow: 1px 1px 3px #000;
            display: none;
        }

        /* 右侧代码编辑区 */
        .code-wrap {
            flex: 1;
            background: #2c3e50;
            border-radius: 10px;
            padding: 15px;
            box-shadow: 0 0 12px #ccc;
            display: flex;
            flex-direction: column;
        }
        .code-title {
            text-align: center;
            font-size: 20px;
            color: #fff;
            margin-bottom: 10px;
        }
        #codeEditor {
            flex: 1;
            width: 100%;
            background: #1a252f;
            color: #69ffc8;
            border: none;
            padding: 15px;
            font-size: 14px;
            line-height: 1.6;
            resize: none;
            outline: none;
            border-radius: 6px;
            margin-bottom: 12px;
        }
        #runBtn {
            padding: 12px;
            background: #27ae60;
            color: #fff;
            border: none;
            font-size: 16px;
            border-radius: 6px;
            cursor: pointer;
        }
        #runBtn:hover {
            background: #219653;
        }
        .tip-text {
            color: #bdc3c7;
            font-size: 13px;
            margin-top: 10px;
            line-height: 1.5;
        }
    </style>
</head>
<body>
<div class="container">
    <!-- 左侧游戏 -->
    <div class="game-wrap">
        <div class="game-title">方块逃亡大闯关</div>
        <div id="gameBox">
            <div class="wall-top"></div>
            <div class="wall-bottom"></div>
            <div id="player"></div>
            <div class="score">积分：0</div>
            <div class="fail-text">废物</div>
            <div class="restart-tip">按 空格键 重新开始</div>
        </div>
    </div>

    <!-- 右侧代码编辑 -->
    <div class="code-wrap">
        <div class="code-title">💻 CSS代码修改区</div>
<textarea id="codeEditor" spellcheck="false">
/* 学生练习：可自由改颜色、大小、背景 */

/* 飞行方块角色 */
#player {
  width: 36px;
  height: 36px;
  background: #f39c12;
  border-radius: 6px;
}

/* 上下围墙样式 */
.wall-top, .wall-bottom {
  background: #27ae60;
}

/* 游戏背景颜色 */
#gameBox {
  background: #7ed6df;
}
</textarea>
        <button id="runBtn">▶️ 修改后运行生效</button>
        <div class="tip-text">
操作：按住↑往上飞 按住↓往下飞 松开就停<br>
难度调低：管道更宽、速度更慢、新手也能玩<br>
穿过管道积累积分，撞到按空格重来
        </div>
    </div>
</div>

<script>
// 获取元素
const gameBox = document.getElementById('gameBox');
const player = document.getElementById('player');
const scoreDom = document.querySelector('.score');
const failText = document.querySelector('.fail-text');
const restartTipDom = document.querySelector('.restart-tip');
const runBtn = document.getElementById('runBtn');
const codeEditor = document.getElementById('codeEditor');

// 游戏变量【难度调低参数】
let playerTop = gameBox.clientHeight / 2;
const speed = 4;         // 移动变慢
let keyUpHold = false;
let keyDownHold = false;
let gameSpeed = 2.5;      // 管道移动变慢
let score = 0;
let isOver = false;
let pipeArr = [];
let gameTimer, pipeTimer;

// 随机颜色库
function getRandomColor() {
    const colors = ['#e74c3c','#9b59b6','#3498db','#f1c40f','#e67e22','#1abc9c','#ff6b81','#70a1ff'];
    return colors[Math.floor(Math.random() * colors.length)];
}

// 上下边界
const topBound = 55;
function getBottomBound(){
    return gameBox.clientHeight - 85;
}

// 按键按下
document.addEventListener('keydown', e => {
    if(isOver){
        if(e.code === 'Space') restartGame();
        return;
    }
    if(e.key === 'ArrowUp') keyUpHold = true;
    if(e.key === 'ArrowDown') keyDownHold = true;
});

// 按键松开
document.addEventListener('keyup', e => {
    if(e.key === 'ArrowUp') keyUpHold = false;
    if(e.key === 'ArrowDown') keyDownHold = false;
});

// 人物移动
function playerMove(){
    if(isOver) return;
    if(keyUpHold) playerTop -= speed;
    if(keyDownHold) playerTop += speed;

    if(playerTop < topBound) playerTop = topBound;
    if(playerTop > getBottomBound()) playerTop = getBottomBound();

    player.style.top = playerTop + 'px';
}

// 创建随机管道【空隙加大 难度降低】
function createPipe(){
    if(isOver) return;
    const gap = Math.floor(Math.random() * 40) + 140; // 空隙更大
    const boxH = gameBox.clientHeight;
    const randomTop = Math.random() * (boxH - gap - 120) + 60;
    const ranColor = getRandomColor();

    let pipeTop = document.createElement('div');
    pipeTop.className = 'pipe';
    pipeTop.style.height = randomTop + 'px';
    pipeTop.style.top = '0';
    pipeTop.style.background = ranColor;
    gameBox.appendChild(pipeTop);

    let pipeBottom = document.createElement('div');
    pipeBottom.className = 'pipe';
    pipeBottom.style.height = (boxH - randomTop - gap) + 'px';
    pipeBottom.style.bottom = 50 + 'px';
    pipeBottom.style.background = ranColor;
    gameBox.appendChild(pipeBottom);

    pipeArr.push({pipeTop, pipeBottom, passed:false});
}

// 游戏主循环
function gameLoop(){
    if(isOver) return;
    playerMove();

    const boxW = gameBox.clientWidth;
    const boxH = gameBox.clientHeight;

    pipeArr.forEach((item, idx) => {
        let leftVal = parseInt(item.pipeTop.style.left) || boxW;
        leftVal -= gameSpeed;
        item.pipeTop.style.left = leftVal + 'px';
        item.pipeBottom.style.left = leftVal + 'px';

        // 积分加分
        if(!item.passed && leftVal < 30){
            item.passed = true;
            score++;
            scoreDom.innerText = '积分：' + score;
        }

        // 碰撞检测
        let pLeft = player.offsetLeft;
        let pRight = pLeft + player.offsetWidth;
        let pTop = player.offsetTop;
        let pBottom = player.offsetTop + player.offsetHeight;

        let oLeft = leftVal;
        let oRight = leftVal + 50;

        if(pRight > oLeft && pLeft < oRight){
            if(pTop < parseInt(item.pipeTop.style.height)){
                gameOver();
            }
            if(pBottom > boxH - 50 - parseInt(item.pipeBottom.style.height)){
                gameOver();
            }
        }

        if(leftVal < -60){
            item.pipeTop.remove();
            item.pipeBottom.remove();
            pipeArr.splice(idx,1);
        }
    });
}

// 游戏结束
function gameOver(){
    isOver = true;
    clearInterval(gameTimer);
    clearInterval(pipeTimer);
    failText.style.display = 'block';
    restartTipDom.style.display = 'block';
}

// 重新开始
function restartGame(){
    pipeArr.forEach(item=>{
        item.pipeTop.remove();
        item.pipeBottom.remove();
    });
    pipeArr = [];
    score = 0;
    scoreDom.innerText = '积分：0';
    isOver = false;
    failText.style.display = 'none';
    restartTipDom.style.display = 'none';
    playerTop = gameBox.clientHeight / 2;
    player.style.top = playerTop + 'px';
    startGame();
}

// 启动游戏 刷新间隔拉长 难度更低
function startGame(){
    gameTimer = setInterval(gameLoop, 30);
    pipeTimer = setInterval(createPipe, 2000); // 管道刷新变慢
}
startGame();

// 右侧代码运行
runBtn.onclick = function(){
    let oldStyle = document.getElementById('dynamicCss');
    if(oldStyle) oldStyle.remove();
    let newStyle = document.createElement('style');
    newStyle.id = 'dynamicCss';
    newStyle.innerHTML = codeEditor.value;
    document.head.appendChild(newStyle);
    alert('✅ 代码已生效，继续闯关！');
};
</script>
</body>
</html>

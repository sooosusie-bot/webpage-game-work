<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>崩坏3 · 女武神格斗</title>
    <style>
        /* 全局米哈游科技风格 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Microsoft YaHei', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0f1927, #1a2a4a);
            color: #e0efff;
            min-height: 100vh;
            overflow: hidden;
        }

        /* 主容器：左侧代码区 + 右侧游戏区 */
        .main-container {
            display: flex;
            height: 100vh;
            width: 100vw;
        }

        /* 代码编辑器区域 */
        .code-panel {
            width: 35%;
            background: #121a29;
            border-right: 2px solid #4fc3f7;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .code-title {
            color: #4fc3f7;
            font-size: 18px;
            font-weight: bold;
            text-align: center;
            text-shadow: 0 0 10px #4fc3f7;
        }

        #code-editor {
            flex: 1;
            background: #0b1220;
            border: 1px solid #394969;
            border-radius: 5px;
            padding: 10px;
            color: #c9d7e8;
            font-size: 14px;
            resize: none;
            outline: none;
            line-height: 1.5;
        }

        .run-btn {
            background: linear-gradient(90deg, #4fc3f7, #2196f3);
            border: none;
            border-radius: 5px;
            padding: 12px;
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 0 10px #4fc3f7;
        }

        .run-btn:hover {
            box-shadow: 0 0 20px #4fc3f7;
            transform: scale(1.02);
        }

        /* 游戏主界面 */
        .game-panel {
            width: 65%;
            display: flex;
            flex-direction: column;
            padding: 20px;
            gap: 15px;
        }

        .game-title {
            text-align: center;
            font-size: 32px;
            color: #ff9800;
            text-shadow: 0 0 15px #ff9800;
            letter-spacing: 3px;
            font-weight: bold;
        }

        /* 战斗画布 */
        #game-canvas {
            flex: 1;
            background: #162542;
            border: 2px solid #4fc3f7;
            border-radius: 10px;
            box-shadow: 0 0 20px #4fc3f7;
            background-image: url('https://p26-doubao-search-sign.byteimg.com/labis/a0bdd1b89de0261afe1b30c9a0e5eb55~tplv-be4g95zd3a-image.jpeg?lk3s=feb11e32&x-expires=1791852153&x-signature=%2Bp%2BoVHD4qNDH0lWnJ0g6JkG9NuA%3D');
            background-size: cover;
            background-position: center;
        }

        /* 操作说明 + 状态栏 */
        .game-info {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 10px;
        }

        .control-info, .status-info {
            background: rgba(15, 25, 39, 0.9);
            border: 1px solid #394969;
            border-radius: 8px;
            padding: 12px;
            width: 48%;
            backdrop-filter: blur(10px);
        }

        .info-title {
            color: #ff9800;
            font-size: 16px;
            margin-bottom: 8px;
            font-weight: bold;
        }

        .control-info p, .status-info p {
            font-size: 13px;
            line-height: 1.4;
            margin: 3px 0;
        }

        /* 女武神选择栏 */
        .valkyrie-select {
            display: flex;
            justify-content: center;
            gap: 20px;
            padding: 15px;
            background: rgba(15, 25, 39, 0.8);
            border-radius: 10px;
            border: 1px solid #394969;
        }

        .valkyrie-btn {
            background: #1e2b4a;
            border: 1px solid #4fc3f7;
            border-radius: 8px;
            padding: 10px 20px;
            color: #e0efff;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .valkyrie-btn.active {
            background: #4fc3f7;
            color: #0f1927;
            box-shadow: 0 0 15px #4fc3f7;
            transform: scale(1.05);
        }

        .valkyrie-btn:hover {
            border-color: #ff9800;
            color: #ff9800;
            transform: scale(1.02);
        }

        .valkyrie-btn img {
            width: 24px;
            height: 24px;
            border-radius: 50%;
        }

        /* 技能按钮 */
        .skill-buttons {
            display: flex;
            justify-content: center;
            gap: 15px;
            padding: 10px;
        }

        .skill-btn {
            background: linear-gradient(135deg, #673ab7, #9c27b0);
            border: none;
            border-radius: 50%;
            width: 60px;
            height: 60px;
            color: white;
            font-size: 20px;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 0 15px rgba(103, 58, 183, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .skill-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 0 25px rgba(103, 58, 183, 0.8);
        }

        .skill-btn.ultimate {
            background: linear-gradient(135deg, #ff5722, #ff9800);
            box-shadow: 0 0 15px rgba(255, 87, 34, 0.5);
        }

        .skill-btn.ultimate:hover {
            box-shadow: 0 0 25px rgba(255, 87, 34, 0.8);
        }

        /* 进度条样式 */
        .progress-bar {
            width: 100%;
            height: 20px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            overflow: hidden;
            margin: 5px 0;
            position: relative;
        }

        .progress-fill {
            height: 100%;
            transition: width 0.3s ease;
            border-radius: 10px;
            position: relative;
            overflow: hidden;
        }

        .progress-fill.hp {
            background: linear-gradient(90deg, #f44336, #ff7043);
            box-shadow: 0 0 10px rgba(244, 67, 54, 0.5);
        }

        .progress-fill.energy {
            background: linear-gradient(90deg, #2196f3, #4fc3f7);
            box-shadow: 0 0 10px rgba(33, 150, 243, 0.5);
        }

        .progress-fill::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            animation: shimmer 2s infinite;
        }

        @keyframes shimmer {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        /* 粒子效果容器 */
        #particles-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
        }

        /* 技能特效 */
        .skill-effect {
            position: absolute;
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(79, 195, 247, 0.8) 0%, rgba(33, 150, 243, 0.4) 50%, transparent 70%);
            animation: skillExplosion 1s ease-out forwards;
            pointer-events: none;
        }

        @keyframes skillExplosion {
            0% {
                transform: scale(0);
                opacity: 1;
            }
            100% {
                transform: scale(3);
                opacity: 0;
            }
        }

        /* 终极技能特效 */
        .ultimate-effect {
            position: absolute;
            width: 200px;
            height: 200px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255, 87, 34, 0.9) 0%, rgba(255, 152, 0, 0.6) 50%, transparent 70%);
            animation: ultimateExplosion 1.5s ease-out forwards;
            pointer-events: none;
            z-index: 20;
        }

        @keyframes ultimateExplosion {
            0% {
                transform: scale(0);
                opacity: 1;
            }
            50% {
                opacity: 0.8;
            }
            100% {
                transform: scale(5);
                opacity: 0;
            }
        }

        /* 受击效果 */
        .hit-effect {
            position: absolute;
            color: #ff4444;
            font-weight: bold;
            font-size: 24px;
            animation: hitFloat 1s ease-out forwards;
            pointer-events: none;
            z-index: 15;
        }

        @keyframes hitFloat {
            0% {
                transform: translateY(0);
                opacity: 1;
            }
            100% {
                transform: translateY(-50px);
                opacity: 0;
            }
        }

        /* 无敌状态闪烁 */
        .invincible {
            animation: blink 0.5s infinite;
        }

        @keyframes blink {
            0%, 50% { opacity: 1; }
            51%, 100% { opacity: 0.3; }
        }
    </style>
</head>
<body>
    <div class="main-container">
        <!-- 左侧代码编辑区 -->
        <div class="code-panel">
            <div class="code-title">⚡ 游戏代码编辑器</div>
            <textarea id="code-editor">// 可在此修改游戏代码，点击【运行修改后代码】实时生效
// 更精细的游戏配置
const GAME_CONFIG = {
    // 移动控制
    playerSpeed: 6,
    playerJump: 15,
    gravity: 0.8,
    
    // 战斗系统
    normalAttackDmg: 12,
    skillAttackDmg: 35,
    ultimateAttackDmg: 80,
    energyGain: 18,
    ultimateEnergyCost: 100,
    
    // 视觉效果
    playerColor: "#ff9800",
    enemyColor: "#f44336",
    skillColor: "#4fc3f7",
    ultimateColor: "#ff5722",
    
    // 游戏机制
    attackCooldown: 0.5,
    skillCooldown: 3,
    ultimateCooldown: 8,
    invincibleTime: 2
};</textarea>
            <button class="run-btn" onclick="runCustomCode()">▶ 运行修改后代码</button>
        </div>

        <!-- 右侧游戏界面 -->
        <div class="game-panel">
            <div class="game-title">崩坏3 · 女武神格斗</div>
            
            <!-- 女武神选择 -->
            <div class="valkyrie-select">
                <button class="valkyrie-btn active" onclick="changeValkyrie(0)">
                    <img src="https://p3-doubao-search-sign.byteimg.com/labis/8f000b581a75e108209066a32f7a29a1~tplv-be4g95zd3a-image.jpeg?lk3s=feb11e32&x-expires=1791852152&x-signature=PloIj3irgn3ITJb8XvqQ63b90As%3D" alt="白练">
                    白练
                </button>
                <button class="valkyrie-btn" onclick="changeValkyrie(1)">
                    <img src="https://p26-doubao-search-sign.byteimg.com/labis/49d6569418c61ce803935b17f9ea031e~tplv-be4g95zd3a-image.jpeg?lk3s=feb11e32&x-expires=1791852152&x-signature=HivYWDX%2Fmkb6Ak2SemFIbM9GPeg%3D" alt="绯红">
                    绯红
                </button>
                <button class="valkyrie-btn" onclick="changeValkyrie(2)">
                    <img src="https://p11-doubao-search-sign.byteimg.com/labis/c0426bd915809a15a9e102783d8e69e4~tplv-be4g95zd3a-image.jpeg?lk3s=feb11e32&x-expires=1791852152&x-signature=cZ4BKn8depNh%2BegLhE9o6UDX9Pw%3D" alt="强袭">
                    强袭
                </button>
            </div>

            <!-- 技能按钮 -->
            <div class="skill-buttons">
                <button class="skill-btn" onclick="castSkill()" title="技能攻击 (K)">K</button>
                <button class="skill-btn ultimate" onclick="castUltimate()" title="终极技能 (L)">L</button>
            </div>

            <!-- 战斗画布 -->
            <canvas id="game-canvas"></canvas>
            <div id="particles-container"></div>

            <!-- 操作说明 + 状态 -->
            <div class="game-info">
                <div class="control-info">
                    <div class="info-title">🎮 操作说明</div>
                    <p>• W/S/A/D：上下左右移动</p>
                    <p>• 空格键：跳跃</p>
                    <p>• J：普通攻击（回复能量）</p>
                    <p>• K：技能攻击（消耗50能量）</p>
                    <p>• L：终极技能（消耗100能量）</p>
                    <p>• 鼠标点击：释放远程技能</p>
                </div>
                <div class="status-info">
                    <div class="info-title">📊 战斗状态</div>
                    <p id="hp-text">女武神血量：100</p>
                    <div class="progress-bar">
                        <div id="hp-bar" class="progress-fill hp" style="width: 100%"></div>
                    </div>
                    <p id="enemy-hp-text">敌人血量：100</p>
                    <div class="progress-bar">
                        <div id="enemy-hp-bar" class="progress-fill hp" style="width: 100%"></div>
                    </div>
                    <p id="energy-text">能量值：0/100</p>
                    <div class="progress-bar">
                        <div id="energy-bar" class="progress-fill energy" style="width: 0%"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 全局游戏配置（默认值）
        let GAME_CONFIG = {
            // 移动控制
            playerSpeed: 6,
            playerJump: 15,
            gravity: 0.8,
            
            // 战斗系统
            normalAttackDmg: 12,
            skillAttackDmg: 35,
            ultimateAttackDmg: 80,
            energyGain: 18,
            ultimateEnergyCost: 100,
            
            // 视觉效果
            playerColor: "#ff9800",
            enemyColor: "#f44336",
            skillColor: "#4fc3f7",
            ultimateColor: "#ff5722",
            
            // 游戏机制
            attackCooldown: 0.5,
            skillCooldown: 3,
            ultimateCooldown: 8,
            invincibleTime: 2
        };

        // 获取画布
        const canvas = document.getElementById("game-canvas");
        const ctx = canvas.getContext("2d");
        canvas.width = canvas.offsetWidth;
        canvas.height = canvas.offsetHeight;

        // 游戏对象
        const player = {
            x: 100, y: canvas.height/2, w: 60, h: 100, 
            hp: 100, energy: 0, name: "白练",
            color: GAME_CONFIG.playerColor,
            velocity: { x: 0, y: 0 },
            isJumping: false,
            facingRight: true,
            isInvincible: false,
            lastAttackTime: 0,
            lastSkillTime: 0,
            lastUltimateTime: 0,
            combo: 0,
            maxCombo: 0
        };

        const enemy = {
            x: canvas.width - 150, y: canvas.height/2, w: 70, h: 120, 
            hp: 100, maxHp: 100,
            color: GAME_CONFIG.enemyColor,
            name: "死士",
            velocity: { x: 0, y: 0 },
            isJumping: false,
            facingRight: false,
            attackPattern: 0,
            lastAttackTime: 0,
            attackRange: 100
        };

        // 女武神配置
        const valkyries = [
            { name: "白练", color: "#ff9800", speed: 1.0, power: 1.0, skillEffect: "ice" },
            { name: "绯红", color: "#f44336", speed: 1.2, power: 0.8, skillEffect: "fire" },
            { name: "强袭", color: "#4caf50", speed: 0.9, power: 1.3, skillEffect: "lightning" }
        ];

        // 按键控制
        const keys = { w: false, s: false, a: false, d: false, j: false, k: false, l: false, space: false };
        document.addEventListener("keydown", (e) => {
            const key = e.key.toLowerCase();
            if(key in keys) keys[key] = true;
            if(e.code === "Space") keys.space = true;
        });
        document.addEventListener("keyup", (e) => {
            const key = e.key.toLowerCase();
            if(key in keys) keys[key] = false;
            if(e.code === "Space") keys.space = false;
        });

        // 鼠标控制
        canvas.addEventListener("click", (e) => {
            const rect = canvas.getBoundingClientRect();
            const mouseX = e.clientX - rect.left;
            const mouseY = e.clientY - rect.top;
            castMouseSkill(mouseX, mouseY);
        });

        // 切换女武神
        function changeValkyrie(index) {
            const valkyrie = valkyries[index];
            player.name = valkyrie.name;
            player.color = valkyrie.color;
            player.speedMultiplier = valkyrie.speed;
            player.powerMultiplier = valkyrie.power;
            player.skillEffect = valkyrie.skillEffect;
            
            // 切换按钮样式
            document.querySelectorAll(".valkyrie-btn").forEach((btn, i) => {
                btn.classList.toggle("active", i === index);
            });
        }

        // 运行用户自定义代码
        function runCustomCode() {
            try {
                eval(document.getElementById("code-editor").value);
                player.color = GAME_CONFIG.playerColor;
                enemy.color = GAME_CONFIG.enemyColor;
                alert("代码修改成功！游戏已实时更新~");
            } catch (e) {
                alert("代码错误：" + e.message);
            }
        }

        // 创建粒子效果
        function createParticle(x, y, color, size = 3, speed = 2) {
            const particle = document.createElement("div");
            particle.style.position = "absolute";
            particle.style.left = x + "px";
            particle.style.top = y + "px";
            particle.style.width = size + "px";
            particle.style.height = size + "px";
            particle.style.backgroundColor = color;
            particle.style.borderRadius = "50%";
            particle.style.pointerEvents = "none";
            particle.style.zIndex = "10";
            
            const angle = Math.random() * Math.PI * 2;
            const vx = Math.cos(angle) * speed;
            const vy = Math.sin(angle) * speed;
            
            document.getElementById("particles-container").appendChild(particle);
            
            // 动画
            let opacity = 1;
            const animate = () => {
                x += vx;
                y += vy;
                opacity -= 0.02;
                
                particle.style.left = x + "px";
                particle.style.top = y + "px";
                particle.style.opacity = opacity;
                
                if (opacity > 0) {
                    requestAnimationFrame(animate);
                } else {
                    particle.remove();
                }
            };
            
            animate();
        }

        // 创建技能特效
        function createSkillEffect(x, y, type = "normal") {
            const effect = document.createElement("div");
            effect.className = type === "ultimate" ? "ultimate-effect" : "skill-effect";
            effect.style.left = (x - 50) + "px";
            effect.style.top = (y - 50) + "px";
            
            document.getElementById("particles-container").appendChild(effect);
            
            setTimeout(() => effect.remove(), type === "ultimate" ? 1500 : 1000);
        }

        // 创建伤害数字
        function createDamageNumber(x, y, damage) {
            const number = document.createElement("div");
            number.className = "hit-effect";
            number.textContent = damage;
            number.style.left = x + "px";
            number.style.top = y + "px";
            
            document.getElementById("particles-container").appendChild(number);
            
            setTimeout(() => number.remove(), 1000);
        }

        // 普通攻击
        function normalAttack() {
            const now = Date.now();
            if (now - player.lastAttackTime < GAME_CONFIG.attackCooldown * 1000) return;
            
            player.lastAttackTime = now;
            player.combo++;
            player.maxCombo = Math.max(player.maxCombo, player.combo);
            
            const damage = Math.floor(GAME_CONFIG.normalAttackDmg * player.powerMultiplier * (1 + player.combo * 0.1));
            enemy.hp = Math.max(0, enemy.hp - damage);
            player.energy = Math.min(100, player.energy + GAME_CONFIG.energyGain);
            
            // 创建攻击特效
            for (let i = 0; i < 10; i++) {
                createParticle(
                    player.x + player.w / 2, 
                    player.y + player.h / 2, 
                    player.color, 
                    2 + Math.random() * 3, 
                    1 + Math.random() * 3
                );
            }
            
            createDamageNumber(enemy.x + enemy.w / 2, enemy.y, damage);
        }

        // 技能攻击
        function castSkill() {
            const now = Date.now();
            if (now - player.lastSkillTime < GAME_CONFIG.skillCooldown * 1000) return;
            if (player.energy < 50) return;
            
            player.lastSkillTime = now;
            player.energy -= 50;
            player.combo = 0;
            
            const damage = Math.floor(GAME_CONFIG.skillAttackDmg * player.powerMultiplier);
            enemy.hp = Math.max(0, enemy.hp - damage);
            
            // 创建技能特效
            createSkillEffect(enemy.x + enemy.w / 2, enemy.y + enemy.h / 2);
            createDamageNumber(enemy.x + enemy.w / 2, enemy.y, damage);
            
            // 创建粒子效果
            for (let i = 0; i < 50; i++) {
                createParticle(
                    enemy.x + enemy.w / 2, 
                    enemy.y + enemy.h / 2, 
                    GAME_CONFIG.skillColor, 
                    3 + Math.random() * 4, 
                    2 + Math.random() * 4
                );
            }
        }

        // 终极技能
        function castUltimate() {
            const now = Date.now();
            if (now - player.lastUltimateTime < GAME_CONFIG.ultimateCooldown * 1000) return;
            if (player.energy < GAME_CONFIG.ultimateEnergyCost) return;
            
            player.lastUltimateTime = now;
            player.energy = 0;
            player.combo = 0;
            
            const damage = Math.floor(GAME_CONFIG.ultimateAttackDmg * player.powerMultiplier);
            enemy.hp = Math.max(0, enemy.hp - damage);
            
            // 创建终极技能特效
            createSkillEffect(enemy.x + enemy.w / 2, enemy.y + enemy.h / 2, "ultimate");
            createDamageNumber(enemy.x + enemy.w / 2, enemy.y - 30, damage);
            
            // 创建大量粒子效果
            for (let i = 0; i < 100; i++) {
                createParticle(
                    enemy.x + enemy.w / 2, 
                    enemy.y + enemy.h / 2, 
                    GAME_CONFIG.ultimateColor, 
                    4 + Math.random() * 6, 
                    3 + Math.random() * 6
                );
            }
        }

        // 鼠标技能
        function castMouseSkill(mouseX, mouseY) {
            if (player.energy < 30) return;
            
            player.energy -= 30;
            
            // 创建轨迹特效
            const startX = player.x + player.w / 2;
            const startY = player.y + player.h / 2;
            const distance = Math.sqrt((mouseX - startX) ** 2 + (mouseY - startY) ** 2);
            
            for (let i = 0; i < 20; i++) {
                setTimeout(() => {
                    const t = i / 20;
                    const x = startX + (mouseX - startX) * t;
                    const y = startY + (mouseY - startY) * t;
                    
                    createParticle(x, y, "#4fc3f7", 2 + Math.random() * 2, 0.5);
                }, i * 50);
            }
            
            // 伤害计算
            const damage = Math.floor(GAME_CONFIG.skillAttackDmg * 0.7 * player.powerMultiplier);
            enemy.hp = Math.max(0, enemy.hp - damage);
            
            setTimeout(() => {
                createSkillEffect(mouseX, mouseY);
                createDamageNumber(mouseX, mouseY - 20, damage);
            }, 1000);
        }

        // 敌人AI
        function updateEnemy() {
            const now = Date.now();
            const distanceToPlayer = Math.abs(player.x - enemy.x);
            
            // 简单AI逻辑
            if (distanceToPlayer < enemy.attackRange && now - enemy.lastAttackTime > 2000) {
                enemy.lastAttackTime = now;
                enemy.attackPattern = (enemy.attackPattern + 1) % 3;
                
                // 不同攻击模式
                switch (enemy.attackPattern) {
                    case 0: // 普通攻击
                        if (!player.isInvincible) {
                            player.hp = Math.max(0, player.hp - 15);
                            player.isInvincible = true;
                            player.invincibleTime = Date.now() + GAME_CONFIG.invincibleTime * 1000;
                            
                            createDamageNumber(player.x + player.w / 2, player.y, 15);
                        }
                        break;
                    case 1: // 跳跃攻击
                        enemy.isJumping = true;
                        enemy.velocity.y = -GAME_CONFIG.playerJump * 0.8;
                        break;
                    case 2: // 冲刺攻击
                        enemy.velocity.x = player.x < enemy.x ? -10 : 10;
                        break;
                }
            } else if (distanceToPlayer > enemy.attackRange + 50) {
                // 接近玩家
                enemy.velocity.x = player.x < enemy.x ? -3 : 3;
            } else {
                enemy.velocity.x *= 0.9;
            }
            
            // 应用重力
            if (enemy.isJumping) {
                enemy.velocity.y += GAME_CONFIG.gravity;
                enemy.y += enemy.velocity.y;
                
                if (enemy.y >= canvas.height - enemy.h - 50) {
                    enemy.y = canvas.height - enemy.h - 50;
                    enemy.isJumping = false;
                    enemy.velocity.y = 0;
                }
            }
            
            // 更新位置
            enemy.x += enemy.velocity.x;
            enemy.x = Math.max(0, Math.min(canvas.width - enemy.w, enemy.x));
            
            // 朝向
            enemy.facingRight = player.x > enemy.x;
        }

        // 绘制游戏
        function drawGame() {
            // 清空画布
            ctx.fillStyle = "rgba(22, 37, 66, 0.3)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 绘制地面
            ctx.fillStyle = "rgba(15, 25, 39, 0.8)";
            ctx.fillRect(0, canvas.height - 50, canvas.width, 50);

            // 绘制女武神
            ctx.save();
            
            // 无敌状态闪烁
            if (player.isInvincible) {
                ctx.globalAlpha = 0.5 + Math.sin(Date.now() * 0.01) * 0.5;
            }
            
            ctx.fillStyle = player.color;
            ctx.translate(player.x + player.w / 2, player.y + player.h / 2);
            if (!player.facingRight) ctx.scale(-1, 1);
            ctx.fillRect(-player.w / 2, -player.h / 2, player.w, player.h);
            
            // 绘制头发
            ctx.fillStyle = "#333";
            ctx.fillRect(-player.w / 2 - 5, -player.h / 2 - 15, player.w + 10, 15);
            
            ctx.restore();

            // 绘制敌人
            ctx.save();
            ctx.fillStyle = enemy.color;
            ctx.translate(enemy.x + enemy.w / 2, enemy.y + enemy.h / 2);
            if (!enemy.facingRight) ctx.scale(-1, 1);
            ctx.fillRect(-enemy.w / 2, -enemy.h / 2, enemy.w, enemy.h);
            
            // 绘制敌人特征
            ctx.fillStyle = "#000";
            ctx.fillRect(-enemy.w / 2 - 8, -enemy.h / 2 - 20, enemy.w + 16, 10);
            
            ctx.restore();

            // 绘制攻击特效
            if (keys.j) {
                ctx.strokeStyle = "#ffeb3b";
                ctx.lineWidth = 3;
                ctx.beginPath();
                ctx.moveTo(player.x + player.w / 2, player.y + player.h / 2);
                ctx.lineTo(enemy.x + enemy.w / 2, enemy.y + enemy.h / 2);
                ctx.stroke();
            }

            // 绘制UI元素
            ctx.fillStyle = "rgba(0, 0, 0, 0.7)";
            ctx.fillRect(10, 10, 200, 60);
            
            ctx.fillStyle = "#fff";
            ctx.font = "14px Microsoft YaHei";
            ctx.fillText(`${player.name} Lv.1`, 20, 30);
            ctx.fillText(`连击: ${player.combo} (最高: ${player.maxCombo})`, 20, 50);
        }

        // 更新游戏逻辑
        function updateGame() {
            // 更新无敌状态
            if (player.isInvincible && Date.now() > player.invincibleTime) {
                player.isInvincible = false;
            }

            // 玩家移动
            player.velocity.x = 0;
            if (keys.a) player.velocity.x = -GAME_CONFIG.playerSpeed * player.speedMultiplier;
            if (keys.d) player.velocity.x = GAME_CONFIG.playerSpeed * player.speedMultiplier;
            
            // 跳跃
            if (keys.space && !player.isJumping) {
                player.isJumping = true;
                player.velocity.y = -GAME_CONFIG.playerJump;
            }
            
            // 应用重力
            if (player.isJumping) {
                player.velocity.y += GAME_CONFIG.gravity;
                player.y += player.velocity.y;
                
                if (player.y >= canvas.height - player.h - 50) {
                    player.y = canvas.height - player.h - 50;
                    player.isJumping = false;
                    player.velocity.y = 0;
                }
            }
            
            // 更新位置
            player.x += player.velocity.x;
            player.x = Math.max(0, Math.min(canvas.width - player.w, player.x));
            
            // 朝向
            player.facingRight = player.velocity.x > 0;
            
            // 攻击检测
            if (keys.j) normalAttack();
            if (keys.k) castSkill();
            if (keys.l) castUltimate();
            
            // 更新敌人
            updateEnemy();
            
            // 死亡判断
            if (enemy.hp <= 0) {
                enemy.hp = enemy.maxHp;
                player.energy = Math.min(100, player.energy + 50);
            }
            
            if (player.hp <= 0) {
                player.hp = 100;
                player.energy = 0;
                player.combo = 0;
            }
            
            // 更新状态文本和进度条
            document.getElementById("hp-text").textContent = `女武神血量：${player.hp}/100`;
            document.getElementById("hp-bar").style.width = player.hp + "%";
            
            document.getElementById("enemy-hp-text").textContent = `敌人血量：${enemy.hp}/${enemy.maxHp}`;
            document.getElementById("enemy-hp-bar").style.width = (enemy.hp / enemy.maxHp * 100) + "%";
            
            document.getElementById("energy-text").textContent = `能量值：${player.energy}/100`;
            document.getElementById("energy-bar").style.width = player.energy + "%";
        }

        // 游戏主循环
        function gameLoop() {
            updateGame();
            drawGame();
            requestAnimationFrame(gameLoop);
        }

        // 初始化游戏
        function initGame() {
            player.y = canvas.height - player.h - 50;
            enemy.y = canvas.height - enemy.h - 50;
            changeValkyrie(0);
            gameLoop();
        }

        // 启动游戏
        initGame();

        // 窗口大小调整
        window.addEventListener("resize", () => {
            canvas.width = canvas.offsetWidth;
            canvas.height = canvas.offsetHeight;
            player.y = canvas.height - player.h - 50;
            enemy.y = canvas.height - enemy.h - 50;
        });
    </script>
</body>
</html>

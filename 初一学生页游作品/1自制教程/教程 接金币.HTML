<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>代码小游戏 - 小猫接金币</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:Arial,sans-serif}
body{background:#f0f4ff;padding:20px}
.container{display:grid;grid-template-columns:1fr 1fr;gap:20px;max-width:1200px;margin:0 auto}
.panel{background:white;border-radius:12px;box-shadow:0 0 10px rgba(0,0,0,0.1);padding:20px}
h1{text-align:center;color:#ff4081;margin-bottom:20px;font-size:24px}
#game{width:100%;height:500px;background:#87ceeb;position:relative;border-radius:8px;overflow:hidden}
#cat{width:60px;height:60px;background:url('https://picsum.photos/60/60') no-repeat center;background-size:cover;position:absolute;bottom:20px;left:50%;border-radius:50%}
.coin{width:30px;height:30px;background:#ffd700;border-radius:50%;position:absolute}
#score{position:absolute;top:10px;left:10px;color:white;font-size:20px;font-weight:bold}
#code{width:100%;height:380px;padding:15px;font-size:14px;border:1px solid #ccc;border-radius:8px;resize:none}
#run{width:100%;padding:12px;background:#6a5acd;color:white;border:none;border-radius:8px;font-size:16px;margin-top:10px;cursor:pointer}
#run:hover{background:#554a97}
</style>
</head>
<body>
<h1>🎮 代码小游戏：小猫接金币（学HTML/CSS/JS）</h1>
<div class="container">
    <div class="panel">
        <h2>🧩 游戏运行区</h2>
        <div id="game">
            <div id="score">得分：0</div>
            <div id="cat"></div>
        </div>
    </div>
    <div class="panel">
        <h2>💻 代码修改区（改完点运行）</h2>
        <textarea id="code">
// 在这里修改代码，立即改变游戏！
// 例：改速度、改颜色、改大小、改位置

// 小猫速度
let catSpeed = 15;

// 金币下落速度
let coinSpeed = 6;

// 小猫大小
cat.style.width = "60px";
cat.style.height = "60px";

// 游戏背景色
game.style.background = "#87ceeb";

// 金币大小
let coinSize = 30;
        </textarea>
        <button id="run">▶️ 运行代码</button>
    </div>
</div>

<script>
const game = document.getElementById('game');
const cat = document.getElementById('cat');
const scoreText = document.getElementById('score');
const code = document.getElementById('code');
const run = document.getElementById('run');

let score = 0;
let catX = window.innerWidth / 2 - 30;
let gameWidth = game.offsetWidth;

// 鼠标控制小猫
game.addEventListener('mousemove',(e)=>{
    let rect = game.getBoundingClientRect();
    catX = e.clientX - rect.left - 30;
    if(catX < 0) catX = 0;
    if(catX > gameWidth - 60) catX = gameWidth - 60;
    cat.style.left = catX + 'px';
});

// 生成金币
function createCoin(){
    let coin = document.createElement('div');
    coin.classList.add('coin');
    coin.style.left = Math.random() * (gameWidth - 30) + 'px';
    coin.style.top = '0px';
    game.appendChild(coin);
}

// 运行用户代码
run.addEventListener('click',()=>{
    try{eval(code.value)}catch(e){alert('代码出错：'+e)}
});

// 游戏主循环
setInterval(()=>{
    document.querySelectorAll('.coin').forEach(c=>{
        let y = parseInt(c.style.top) + 6;
        c.style.top = y + 'px';
        if(y > 470){
            if(parseInt(cat.style.left) < parseInt(c.style.left) + 30 &&
               parseInt(cat.style.left) + 60 > parseInt(c.style.left)){
                score++;
                scoreText.innerText = "得分："+score;
            }
            c.remove();
        }
    });
},30);

setInterval(createCoin,1000);
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>双人碰碰球</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#1a1a2e;display:flex;justify-content:center;align-items:center;height:100vh;flex-direction:column;color:white;font-family:Arial}
.game{width:800px;height:400px;background:#0f3460;position:relative;border:2px solid #fff}
.paddle{width:12px;height:80px;background:#fff;position:absolute;top:50%;transform:translateY(-50%)}
#p1{left:20px}
#p2{right:20px}
.ball{width:12px;height:12px;background:#ff2e63;border-radius:50%;position:absolute;top:50%;left:50%}
.score{font-size:32px;margin-bottom:10px;display:flex;gap:40px}
.win{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:40px;color:#ff2e63;display:none}
</style>
</head>
<body>
<div class="score">
  <div id="s1">0</div>
  <div id="s2">0</div>
</div>
<div class="game" id="game">
  <div class="paddle" id="p1"></div>
  <div class="paddle" id="p2"></div>
  <div class="ball" id="ball"></div>
  <div class="win" id="win"></div>
</div>

<script>
const game = document.getElementById('game');
const p1 = document.getElementById('p1');
const p2 = document.getElementById('p2');
const ball = document.getElementById('ball');
const s1 = document.getElementById('s1');
const s2 = document.getElementById('s2');
const win = document.getElementById('win');

let py1 = 160, py2 = 160;
let bx = 400, by = 200;
let vx =4, vy = -4;
let score1 = 0, score2 = 0;
const speed = 8;
let gameOver = false;

document.addEventListener('keydown', e => {
  if(gameOver) return
  if(e.key === 'w') py1 -= speed
  if(e.key === 's') py1 += speed
  if(e.key === 'ArrowUp') py2 -= speed
  if(e.key === 'ArrowDown') py2 += speed

  py1 = Math.max(0, Math.min(320, py1))
  py2 = Math.max(0, Math.min(320, py2))
  p1.style.top = py1 + 'px'
  p2.style.top = py2 + 'px'
})

function reset() {
  bx = 400
  by = 200
  vx =Math.random() > 0.5 ? 4 : -4
  vy = Math.random() > 0.5 ? 4 : -4
}

function loop() {
  if(gameOver) return
  bx += vx
  by += vy

  if(by <= 0 || by >= 388) vy *= -1

  // 碰撞球拍
  if(bx < 40 && bx > 20 && by > py1 && by < py1 + 80) vx *= -1
  if(bx > 760 && bx < 780 && by > py2 && by < py2 + 80) vx *= -1

  // 得分
  if(bx < 0) {
    score2++
    s2.textContent = score2
    if(score2 >=5) {
      win.textContent = '玩家2胜利！'
      win.style.display = 'block'
      gameOver = true
    }
    reset()
  }
  if(bx > 800) {
    score1++
    s1.textContent = score1
    if(score1 >=5) {
      win.textContent = '玩家1胜利！'
      win.style.display = 'block'
      gameOver = true
    }
    reset()
  }

  ball.style.left = bx + 'px'
  ball.style.top = by + 'px'
  requestAnimationFrame(loop)
}

reset()
loop()
</script>
</body>
</html>

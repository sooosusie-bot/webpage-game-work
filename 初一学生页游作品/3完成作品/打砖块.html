<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>打砖块游戏 - 在线编辑器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Microsoft YaHei', sans-serif;
        }

        body {
            background: #1a1a2e;
            color: #fff;
            padding: 20px;
        }

        .container {
            display: flex;
            gap: 20px;
            max-width: 1600px;
            margin: 0 auto;
            flex-wrap: wrap;
        }

        /* 游戏区域样式 */
        .game-panel {
            flex: 1;
            min-width: 400px;
            background: #16213e;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0,0,0,0.3);
        }

        .game-title {
            text-align: center;
            margin-bottom: 15px;
            color: #00d4ff;
        }

        #gameCanvas {
            display: block;
            margin: 0 auto;
            background: #000;
            border: 2px solid #00d4ff;
            border-radius: 5px;
        }

        .game-info {
            text-align: center;
            margin-top: 15px;
            font-size: 16px;
        }

        /* 代码编辑器区域 */
        .code-panel {
            flex: 1;
            min-width: 400px;
            background: #16213e;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
        }

        .code-title {
            margin-bottom: 15px;
            color: #e94560;
        }

        #codeEditor {
            flex: 1;
            width: 100%;
            height: 500px;
            background: #0f3460;
            color: #fff;
            border: 2px solid #e94560;
            border-radius: 5px;
            padding: 15px;
            font-family: 'Consolas', monospace;
            font-size: 14px;
            resize: none;
            outline: none;
        }

        .run-btn {
            margin-top: 15px;
            padding: 12px;
            background: #00d4ff;
            color: #000;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .run-btn:hover {
            background: #00a8cc;
            transform: translateY(-2px);
        }

        .tips {
            margin-top: 10px;
            font-size: 12px;
            color: #ccc;
            line-height: 1.4;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 游戏区域 -->
        <div class="game-panel">
            <h2 class="game-title">🎮 打砖块游戏</h2>
            <canvas id="gameCanvas" width="400" height="500"></canvas>
            <div class="game-info">
                操作：← → 方向键控制挡板 | 空格键开始游戏
            </div>
        </div>

        <!-- 代码编辑器区域 -->
        <div class="code-panel">
            <h2 class="code-title">💻 代码编辑器</h2>
            <textarea id="codeEditor">// 可修改这里的代码，点击运行生效
// 打砖块游戏核心代码

const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

// 游戏元素参数
let ball = {
    x: canvas.width / 2,
    y: canvas.height - 50,
    radius: 8,
    dx: 4,  // 水平速度
    dy: -4  // 垂直速度
};

let paddle = {
    x: canvas.width / 2 - 50,
    y: canvas.height - 20,
    width: 100,
    height: 10,
    speed: 8
};

let bricks = [];
let brickRowCount = 5;
let brickColumnCount = 8;
let brickWidth = 45;
let brickHeight = 20;
let brickPadding = 5;
let brickOffsetTop = 40;
let brickOffsetLeft = 15;

let score = 0;
let gameStarted = false;

// 初始化砖块
function initBricks() {
    bricks = [];
    for(let c=0; c<brickColumnCount; c++) {
        bricks[c] = [];
        for(let r=0; r<brickRowCount; r++) {
            bricks[c][r] = { x: 0, y: 0, status: 1 };
        }
    }
}

// 绘制小球
function drawBall() {
    ctx.beginPath();
    ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI*2);
    ctx.fillStyle = '#00d4ff';
    ctx.fill();
    ctx.closePath();
}

// 绘制挡板
function drawPaddle() {
    ctx.beginPath();
    ctx.rect(paddle.x, paddle.y, paddle.width, paddle.height);
    ctx.fillStyle = '#e94560';
    ctx.fill();
    ctx.closePath();
}

// 绘制砖块
function drawBricks() {
    for(let c=0; c<brickColumnCount; c++) {
        for(let r=0; r<brickRowCount; r++) {
            if(bricks[c][r].status == 1) {
                let brickX = c*(brickWidth+brickPadding) + brickOffsetLeft;
                let brickY = r*(brickHeight+brickPadding) + brickOffsetTop;
                bricks[c][r].x = brickX;
                bricks[c][r].y = brickY;
                
                ctx.beginPath();
                ctx.rect(brickX, brickY, brickWidth, brickHeight);
                ctx.fillStyle = r%2===0 ? '#ffd700' : '#ff6b6b';
                ctx.fill();
                ctx.closePath();
            }
        }
    }
}

// 碰撞检测
function collisionDetection() {
    for(let c=0; c<brickColumnCount; c++) {
        for(let r=0; r<brickRowCount; r++) {
            let b = bricks[c][r];
            if(b.status == 1) {
                if(ball.x > b.x && ball.x < b.x+brickWidth && ball.y > b.y && ball.y < b.y+brickHeight) {
                    ball.dy = -ball.dy;
                    b.status = 0;
                    score++;
                    if(score == brickRowCount*brickColumnCount) {
                        alert('恭喜你，游戏胜利！🎉');
                        document.location.reload();
                    }
                }
            }
        }
    }
}

// 绘制分数
function drawScore() {
    ctx.font = '16px Arial';
    ctx.fillStyle = '#fff';
    ctx.fillText('分数: ' + score, 8, 20);
}

// 移动挡板
function movePaddle() {
    if(rightPressed && paddle.x < canvas.width - paddle.width) {
        paddle.x += paddle.speed;
    }
    if(leftPressed && paddle.x > 0) {
        paddle.x -= paddle.speed;
    }
}

// 键盘控制
let rightPressed = false;
let leftPressed = false;

document.addEventListener('keydown', keyDownHandler);
document.addEventListener('keyup', keyUpHandler);
document.addEventListener('keydown', startGame);

function keyDownHandler(e) {
    if(e.key == 'Right' || e.key == 'ArrowRight') {
        rightPressed = true;
    }
    if(e.key == 'Left' || e.key == 'ArrowLeft') {
        leftPressed = true;
    }
}

function keyUpHandler(e) {
    if(e.key == 'Right' || e.key == 'ArrowRight') {
        rightPressed = false;
    }
    if(e.key == 'Left' || e.key == 'ArrowLeft') {
        leftPressed = false;
    }
}

function startGame(e) {
    if(e.key == ' ' && !gameStarted) {
        gameStarted = true;
    }
}

// 游戏主循环
function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    drawBricks();
    drawBall();
    drawPaddle();
    drawScore();
    collisionDetection();
    movePaddle();

    // 小球碰壁反弹
    if(ball.x + ball.dx > canvas.width - ball.radius || ball.x + ball.dx < ball.radius) {
        ball.dx = -ball.dx;
    }
    if(ball.y + ball.dy < ball.radius) {
        ball.dy = -ball.dy;
    } else if(ball.y + ball.dy > canvas.height - ball.radius) {
        // 检测是否碰到挡板
        if(ball.x > paddle.x && ball.x < paddle.x + paddle.width) {
            ball.dy = -ball.dy;
        } else {
            // 游戏结束
            alert('游戏结束！分数：' + score);
            document.location.reload();
        }
    }

    if(gameStarted) {
        ball.x += ball.dx;
        ball.y += ball.dy;
    }

    requestAnimationFrame(draw);
}

// 启动游戏
initBricks();
draw();</textarea>
            <button class="run-btn" onclick="runCode()">▶️ 运行修改后的代码</button>
            <div class="tips">
                提示：<br>
                1. 可修改速度、颜色、大小、砖块数量等参数<br>
                2. 修改完成后点击运行按钮生效<br>
                3. 代码出错会自动刷新恢复原始代码
            </div>
        </div>
    </div>

    <script>
        // 初始化游戏
        window.onload = function() {
            runCode();
        };

        // 运行编辑器内的代码
        function runCode() {
            try {
                // 获取编辑器代码
                const code = document.getElementById('codeEditor').value;
                // 清空原有脚本执行
                const canvas = document.getElementById('gameCanvas');
                const ctx = canvas.getContext('2d');
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                
                // 执行新代码
                eval(code);
            } catch (error) {
                alert('代码错误：' + error.message + '\n已恢复原始代码');
                // 出错恢复默认代码
                location.reload();
            }
        }
    </script>
</body>
</html>
